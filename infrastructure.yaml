AWSTemplateFormatVersion: '2010-09-09'
Description: Static site infrastructure for galaga.edouard.nz (marimo WASM notebooks)

Parameters:
  DomainName:
    Type: String
    Default: galaga.edouard.nz
  HostedZoneId:
    Type: String
    Description: Route 53 Hosted Zone ID for edouard.nz

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref DomainName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${SiteBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${DomainName}-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId

  ResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: galaga-edouard-nz-cross-origin-isolation
        CustomHeadersConfig:
          Items:
            - Header: Cross-Origin-Opener-Policy
              Value: same-origin
              Override: true
            - Header: Cross-Origin-Embedder-Policy
              Value: require-corp
              Override: true

  LambdaEdgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
                - edgelambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub ${SiteBucket.Arn}/*

  NotebookLoaderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: galaga-notebook-loader
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaEdgeRole.Arn
      Timeout: 10
      MemorySize: 256
      Code:
        ZipFile: |
          import boto3
          import urllib.parse
          import re

          s3 = boto3.client('s3')
          BUCKET = 'galaga.edouard.nz'

          def handler(event, context):
              request = event['Records'][0]['cf']['request']
              params = urllib.parse.parse_qs(request.get('querystring', ''))

              nb = params.get('nb', [None])[0]
              if not nb:
                  # No ?nb= param, let it pass through to S3 (landing page)
                  return request

              # Sanitize notebook name
              nb = re.sub(r'[^a-zA-Z0-9_-]', '', nb)

              try:
                  # Fetch the template and notebook
                  template = s3.get_object(Bucket=BUCKET, Key='e/index.html')['Body'].read().decode('utf-8')
                  notebook = s3.get_object(Bucket=BUCKET, Key=f'notebooks/{nb}.py')['Body'].read().decode('utf-8')
              except s3.exceptions.NoSuchKey:
                  return {
                      'status': '404',
                      'statusDescription': 'Not Found',
                      'headers': {'content-type': [{'value': 'text/html'}]},
                      'body': f'<html><body><h1>Notebook "{nb}" not found</h1><a href="/">Back</a></body></html>',
                  }

              # Escape the notebook code for JSON embedding
              escaped = notebook.replace('\\', '\\\\').replace('"', '\\"').replace('\n', '\\n').replace('\r', '\\r')

              # Inject into template
              html = template.replace('notebookCode: ""', f'notebookCode: "{escaped}"')

              # Also set the marimo-code element
              encoded = urllib.parse.quote(notebook)
              html = re.sub(
                  r'(<marimo-code hidden="">)(</marimo-code>)',
                  rf'\1{encoded}\2',
                  html,
              )

              # Fix relative paths (template lives at /e/ but served from /)
              html = html.replace('"./assets/', '"./e/assets/')
              html = html.replace('"./favicon', '"./e/favicon')
              html = html.replace('"./apple-touch-icon', '"./e/apple-touch-icon')
              html = html.replace('"./manifest.json', '"./e/manifest.json')
              html = html.replace('"./logo.png', '"./e/logo.png')
              html = html.replace('"./site.webmanifest', '"./e/site.webmanifest')

              return {
                  'status': '200',
                  'statusDescription': 'OK',
                  'headers': {
                      'content-type': [{'value': 'text/html; charset=utf-8'}],
                      'cache-control': [{'value': 'public, max-age=60'}],
                      'cross-origin-opener-policy': [{'value': 'same-origin'}],
                      'cross-origin-embedder-policy': [{'value': 'require-corp'}],
                  },
                  'body': html,
              }

  NotebookLoaderVersion:
    Type: AWS::Lambda::Version
    DeletionPolicy: Retain
    Properties:
      FunctionName: !Ref NotebookLoaderFunction
      Description: !Sub "Version for ${NotebookLoaderFunction}"

  CachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: galaga-cache-policy
        DefaultTTL: 86400
        MaxTTL: 31536000
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: whitelist
            QueryStrings:
              - nb
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Aliases:
          - !Ref DomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref Certificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !Ref OriginAccessControl
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: !Ref CachePolicy
          ResponseHeadersPolicyId: !Ref ResponseHeadersPolicy
          LambdaFunctionAssociations:
            - EventType: origin-request
              LambdaFunctionARN: !Ref NotebookLoaderVersion
              IncludeBody: false
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 300
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 300

  DNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt SiteDistribution.DomainName

Outputs:
  BucketName:
    Value: !Ref SiteBucket
  DistributionId:
    Value: !Ref SiteDistribution
  DistributionDomain:
    Value: !GetAtt SiteDistribution.DomainName
  WebsiteURL:
    Value: !Sub https://${DomainName}
